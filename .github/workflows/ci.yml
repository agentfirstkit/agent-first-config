name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Fixed test entrypoint (MSRV)
    runs-on: ubuntu-latest
    container: rust:1.88-bookworm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # The rust:1.88-bookworm image does not bundle rustfmt/clippy.
      - run: rustup component add rustfmt clippy
      - run: ./scripts/test.sh

  test-features:
    name: Feature combinations
    runs-on: ubuntu-latest
    container: rust:1.88-bookworm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: cargo test --no-default-features --all-targets
      - run: cargo test --no-default-features --features json --all-targets
      - run: cargo test --no-default-features --features toml --all-targets
      - run: cargo test --no-default-features --features yaml --all-targets
      - run: cargo test --no-default-features --features dotenv --all-targets
      - run: cargo test --no-default-features --features ini --all-targets
      - run: cargo test --no-default-features --features schema --lib
      - run: cargo test --no-default-features --features cli,json --all-targets

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    container: rust:1.88-bookworm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: rustup component add clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    container: rust:1.88-bookworm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: rustup component add rustfmt
      - run: cargo fmt -- --check

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    container: rust:1.88-bookworm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: cargo doc --all-features --no-deps

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    container: rust:1.88-bookworm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: cargo test --test e2e --all-features

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    container: rust:1.88-bookworm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  # The container jobs above only exercise Linux. macOS and Windows compile the
  # `#[cfg(not(unix))]` branches (e.g. the unsupported secret-fd/prompt paths)
  # and run the platform-agnostic Rust suite; Unix-only tests are cfg-gated out.
  # Shell forward-validation stays Linux-only (it drives symlink/hardlink/fd
  # behaviour that is Unix by design).
  test-cross-platform:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features
